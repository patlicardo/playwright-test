# Runs Cucumber BDD tests (cucumber-js + Playwright).
# Manual: Actions → this workflow → Run workflow
name: Cucumber

on:
  workflow_dispatch:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

concurrency:
  group: cucumber-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  cucumber:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        # Hooks use `chromium` from `playwright` (see features/support/hooks.ts)
        run: npx playwright install --with-deps chromium

      - name: Run Cucumber tests
        run: npm run test:cucumber
        env:
          CI: true

      - name: Upload Cucumber HTML report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cucumber-report
          path: cucumber-report/
          if-no-files-found: ignore
