# Jira Xray can trigger this workflow (GitHub: "Run workflow" or API / Xray "Trigger GitHub workflow"),
# and optionally import Cucumber results back to Xray when secrets and execution metadata are set.
# Test key comes from feature filename: {TESTKEY}--{description}.feature (e.g. PT-1--login.feature).
name: Xray (Cucumber)

on:
  workflow_dispatch:
    inputs:
      xray_test_exec_key:
        description: "Jira Xray Test Execution key to update (e.g. PT-2)."
        required: true
        type: string
      xray_test_key:
        description: "Optional Jira Test key to run a single feature (e.g. PT-1). If empty, runs all compliant features."
        required: false
        type: string
        default: ""
  repository_dispatch:
    types: [xray-cucumber]

concurrency:
  group: xray-cucumber-${{ github.ref }}-${{ github.event_name }}-${{ github.run_id }}
  cancel-in-progress: false

jobs:
  xray:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Resolve Jira / Xray parameters
        id: p
        shell: bash
        env:
          E_NAME: ${{ github.event_name }}
          IN_EXEC: ${{ inputs.xray_test_exec_key }}
          IN_KEY: ${{ inputs.xray_test_key }}
        run: |
          if [ "$E_NAME" = "repository_dispatch" ]; then
            EXEC="${{ github.event.client_payload.xray_test_exec_key }}"
            KEY="${{ github.event.client_payload.xray_test_key }}"
          else
            EXEC="${IN_EXEC:-}"
            KEY="${IN_KEY:-}"
          fi
          if [ -z "$EXEC" ]; then
            echo "xray_test_exec_key is required"
            exit 1
          fi
          echo "xray_test_key=${KEY}" >> "$GITHUB_OUTPUT"
          echo "xray_test_exec_key=${EXEC}" >> "$GITHUB_OUTPUT"
          if [ -n "$KEY" ]; then
            echo "Running only feature(s) for key: $KEY"
          else
            echo "Running all compliant feature files"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: "npm"

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright (Chromium)
        run: npx playwright install --with-deps chromium

      - name: Run Cucumber (Xray)
        env:
          CI: true
          XRAY_TEST_KEY: ${{ steps.p.outputs.xray_test_key }}
        run: |
          set -e
          shopt -s nullglob
          files=(features/*.feature)
          compliant=()
          for f in "${files[@]}"; do
            base="$(basename "$f")"
            if [[ "$base" =~ ^[A-Z][A-Z0-9_]+-[0-9]+--.+\.feature$ ]]; then
              compliant+=("$f")
            fi
          done
          if [ "${#compliant[@]}" -eq 0 ]; then
            echo "No compliant feature files found (expected: {TESTKEY}--{name}.feature)."
            exit 1
          fi
          if [ -n "$XRAY_TEST_KEY" ]; then
            selected=()
            for f in "${compliant[@]}"; do
              base="$(basename "$f")"
              if [[ "$base" == "${XRAY_TEST_KEY}"--*.feature ]]; then
                selected+=("$f")
              fi
            done
            if [ "${#selected[@]}" -eq 0 ]; then
              echo "No feature file found for test key: $XRAY_TEST_KEY"
              exit 1
            fi
            npx cucumber-js "${selected[@]}"
          else
            npx cucumber-js "${compliant[@]}"
          fi

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: xray-cucumber-report
          path: |
            cucumber-report/
          if-no-files-found: ignore

      - name: Gate Xray result import
        id: ximport
        if: always()
        env:
          XRAY_CLIENT_ID: ${{ secrets.XRAY_CLIENT_ID }}
          XRAY_CLIENT_SECRET: ${{ secrets.XRAY_CLIENT_SECRET }}
          XRAY_EXEC: ${{ steps.p.outputs.xray_test_exec_key }}
        run: |
          if [ -n "${XRAY_CLIENT_ID}" ] && [ -n "${XRAY_CLIENT_SECRET}" ] && [ -n "$XRAY_EXEC" ] && [ -f cucumber-report/cucumber.json ]; then
            echo "do=1" >> "$GITHUB_OUTPUT"
            echo "Xray result import: enabled"
          else
            echo "do=0" >> "$GITHUB_OUTPUT"
            echo "Xray result import: skipped (missing secrets, report file, or execution key)"
          fi

      # Xray Cloud: import with ?testExecutionKey=... (not testExecIssueKey — wrong name = new PT-*).
      - name: Import results to Xray
        if: always() && steps.ximport.outputs.do == '1'
        env:
          XRAY_CLIENT_ID: ${{ secrets.XRAY_CLIENT_ID }}
          XRAY_CLIENT_SECRET: ${{ secrets.XRAY_CLIENT_SECRET }}
          XRAY_TEST_EXEC_KEY: ${{ steps.p.outputs.xray_test_exec_key }}
        run: node scripts/xray-import-cucumber.cjs
